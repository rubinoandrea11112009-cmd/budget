<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<meta name="theme-color" content="#000000"/>
<title>Budget</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #000;
    --bg2: #0f0f0f;
    --bg3: #1a1a1a;
    --bg4: #242424;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --text2: #999;
    --text3: #555;
    --orange: #e86500;
    --orange-dim: #e8650022;
    --blue: #378ADD;
    --blue-dim: #378ADD22;
    --green: #4CAF50;
    --green-dim: #4CAF5022;
    --red: #E24B4A;
    --red-dim: #E24B4A22;
    --yellow: #BA7517;
    --yellow-dim: #BA751722;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
  }

  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: calc(env(safe-area-inset-top) + 12px) 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 20px; font-weight: 600; }
  .header-month { font-size: 13px; color: var(--text2); }

  .content { padding: 20px 16px; }

  .notif-banner {
    background: #2a1a00;
    border: 1px solid #e8650055;
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    color: #e8a060;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  .tasca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .tasca-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .tasca-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .tasca-amount { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .tasca-amount.benzina { color: var(--yellow); }
  .tasca-amount.paghetta { color: var(--blue); }
  .tasca-spent { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .bar { height: 4px; border-radius: 4px; background: var(--bg4); margin-top: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

  .week-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
  }
  .week-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .week-label { color: var(--text2); }

  .tab-bar {
    display: flex; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    color: var(--text2); background: transparent; white-space: nowrap;
    transition: all 0.15s;
  }
  .tab.active { background: var(--text); color: var(--bg); border-color: transparent; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title { font-size: 14px; font-weight: 500; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; color: var(--text2); }

  .field { margin-bottom: 10px; }
  .field input, .field select {
    width: 100%; padding: 12px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 15px;
    outline: none; -webkit-appearance: none; appearance: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--orange); }
  .field input::placeholder { color: var(--text3); }
  .field select option { background: #1a1a1a; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

  .btn-full {
    width: 100%; padding: 14px;
    background: var(--orange); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-full:active { transform: scale(0.98); background: #ff7a18; }

  .entry-list { display: flex; flex-direction: column; gap: 8px; max-height: 60vh; overflow-y: auto; }
  .entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border-radius: var(--radius-sm);
    background: var(--bg3);
  }
  .entry-left { display: flex; flex-direction: column; gap: 3px; }
  .entry-desc { font-size: 14px; color: var(--text); }
  .entry-meta { font-size: 11px; color: var(--text3); }
  .entry-right { display: flex; align-items: center; gap: 10px; }
  .entry-amount { font-size: 15px; font-weight: 600; }
  .entry-amount.neg { color: var(--red); }
  .entry-amount.pos { color: var(--green); }
  .btn-del {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--red-dim); border: 1px solid #E24B4A44;
    color: var(--red); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-del:active { background: var(--red); color: #fff; }

  .pill {
    font-size: 10px; padding: 2px 8px; border-radius: 20px; display: inline-block;
  }
  .pill.benzina { background: var(--yellow-dim); color: var(--yellow); }
  .pill.paghetta { background: var(--blue-dim); color: var(--blue); }
  .pill.entrata { background: var(--green-dim); color: var(--green); }

  .sub-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; border-radius: var(--radius-sm); background: var(--bg3);
    margin-bottom: 8px;
  }
  .sub-name { font-size: 14px; color: var(--text); }
  .sub-detail { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--blue-dim); color: var(--blue); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .empty { font-size: 13px; color: var(--text3); text-align: center; padding: 20px 0; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 0; cursor: pointer; color: var(--text3);
    font-size: 10px; gap: 3px; border: none; background: none;
    transition: color 0.15s;
  }
  .nav-item i { font-size: 22px; }
  .nav-item.active { color: var(--orange); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">💰 Budget</div>
    <div class="header-month" id="header-month"></div>
  </div>
  <div style="font-size:13px;color:var(--text2);" id="header-totale"></div>
</div>

<div class="content">
  <div id="notif-area"></div>

  <div class="tasca-grid">
    <div class="tasca-card">
      <div class="tasca-label"><i class="ti ti-gas-station"></i> Benzina</div>
      <div class="tasca-amount benzina" id="benz-saldo">€65,00</div>
      <div class="tasca-spent" id="benz-spent">spesi €0,00</div>
      <div class="bar"><div class="bar-fill" id="benz-bar" style="width:0%;background:#BA7517;"></div></div>
    </div>
    <div class="tasca-card">
      <div class="tasca-label"><i class="ti ti-pig-money"></i> Paghetta</div>
      <div class="tasca-amount paghetta" id="pagh-saldo">€60,00</div>
      <div class="tasca-spent" id="pagh-spent">spesi €0,00</div>
      <div class="bar"><div class="bar-fill" id="pagh-bar" style="width:0%;background:#378ADD;"></div></div>
    </div>
  </div>

  <div class="week-card">
    <div class="week-row">
      <span class="week-label">Limite settimana (gio–mer, paghetta)</span>
      <span id="week-remaining" style="font-size:13px;font-weight:500;">€15,00 rimanenti</span>
    </div>
    <div class="bar" style="margin-top:10px;"><div class="bar-fill" id="week-bar" style="width:0%;background:#4CAF50;"></div></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('spese',this)">Spese / entrate</button>
    <button class="tab" onclick="switchTab('abbonamenti',this)">Abbonamenti</button>
    <button class="tab" onclick="switchTab('storico',this)">Storico</button>
  </div>

  <!-- SPESE -->
  <div class="panel active" id="panel-spese">
    <div class="card">
      <div class="card-title"><i class="ti ti-plus-minus"></i> Nuovo movimento</div>
      <div class="field">
        <input type="text" id="desc-input" placeholder="Descrizione (es. Q8, pizza...)" />
      </div>
      <div class="field-row">
        <input type="number" id="amount-input" placeholder="Importo €" step="0.01" min="0" inputmode="decimal" style="padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;width:100%;"/>
        <select id="type-select" style="padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;width:100%;">
          <option value="spesa-paghetta">− Paghetta</option>
          <option value="spesa-benzina">− Benzina</option>
          <option value="entrata-paghetta">+ Paghetta</option>
          <option value="entrata-benzina">+ Benzina</option>
        </select>
      </div>
      <button class="btn-full" onclick="addMovimento()">
        <i class="ti ti-check"></i> Aggiungi
      </button>
    </div>
  </div>

  <!-- ABBONAMENTI -->
  <div class="panel" id="panel-abbonamenti">
    <div class="card">
      <div class="card-title"><i class="ti ti-refresh"></i> I tuoi abbonamenti</div>
      <div id="sub-list"><div class="empty">Nessun abbonamento</div></div>
      <div class="divider"></div>
      <div class="card-title"><i class="ti ti-plus"></i> Aggiungi abbonamento</div>
      <div class="field">
        <input type="text" id="sub-name" placeholder="Nome (es. Netflix)" />
      </div>
      <div class="field-row">
        <input type="number" id="sub-price" placeholder="€/mese" step="0.01" min="0" inputmode="decimal" style="padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;width:100%;"/>
        <input type="number" id="sub-day" placeholder="Giorno rinnovo" min="1" max="31" inputmode="numeric" style="padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;width:100%;"/>
      </div>
      <div class="field">
        <select id="sub-tasca" style="width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;">
          <option value="paghetta">Paghetta</option>
          <option value="benzina">Benzina</option>
        </select>
      </div>
      <button class="btn-full" onclick="addAbbonamento()">
        <i class="ti ti-plus"></i> Aggiungi abbonamento
      </button>
    </div>
  </div>

  <!-- STORICO -->
  <div class="panel" id="panel-storico">
    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i> Tutti i movimenti</div>
      <div class="entry-list" id="storico-list"><div class="empty">Nessun movimento ancora</div></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" id="nav-spese" onclick="switchNav('spese')">
    <i class="ti ti-plus-minus"></i>
    <span>Movimento</span>
  </button>
  <button class="nav-item" id="nav-abbonamenti" onclick="switchNav('abbonamenti')">
    <i class="ti ti-refresh"></i>
    <span>Abbonamenti</span>
  </button>
  <button class="nav-item" id="nav-storico" onclick="switchNav('storico')">
    <i class="ti ti-history"></i>
    <span>Storico</span>
  </button>
</div>

<script>
(function(){
  const BENZ_TOT = 65;
  const PAGH_TOT = 60;
  const WEEK_LIMIT = 15;

  function load(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch(e){ return def; } }
  function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }

  let movimenti = load('bgt_movimenti', []);
  let abbonamenti = load('bgt_abbonamenti', [
    { id: 1, nome: 'iCloud', prezzo: 0.99, giorno: 10, tasca: 'paghetta' }
  ]);

  function fmt(n) { return '€' + Math.abs(n).toFixed(2).replace('.', ','); }

  function getMonday() {
    // Settimana che inizia il giovedì (4)
    const d = new Date();
    d.setHours(0,0,0,0);
    const day = d.getDay(); // 0=dom, 1=lun, ..., 4=gio, 5=ven, 6=sab
    const diff = (day + 3) % 7; // quanti giorni fa era giovedì
    d.setDate(d.getDate() - diff);
    return d;
  }

  function calcTasca(tasca) {
    return movimenti.filter(m => m.tasca === tasca).reduce((acc, m) => {
      return m.tipo === 'entrata' ? acc + m.importo : acc - m.importo;
    }, tasca === 'benzina' ? BENZ_TOT : PAGH_TOT);
  }

  function calcSpeso(tasca) {
    return movimenti.filter(m => m.tasca === tasca && m.tipo === 'spesa').reduce((acc, m) => acc + m.importo, 0);
  }

  function calcWeek() {
    const monday = getMonday();
    return movimenti.filter(m => m.tipo === 'spesa' && m.tasca === 'paghetta' && new Date(m.data) >= monday)
      .reduce((acc, m) => acc + m.importo, 0);
  }

  function render() {
    const benzSaldo = calcTasca('benzina');
    const paghSaldo = calcTasca('paghetta');
    const benzSpeso = calcSpeso('benzina');
    const paghSpeso = calcSpeso('paghetta');
    const weekSpent = calcWeek();
    const weekRem = WEEK_LIMIT - weekSpent;
    const weekPct = Math.min(100, (weekSpent / WEEK_LIMIT) * 100);

    // header
    const now = new Date();
    document.getElementById('header-month').textContent =
      now.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
    document.getElementById('header-totale').textContent =
      'Totale: ' + fmt(benzSaldo + paghSaldo);

    // benzina
    document.getElementById('benz-saldo').textContent = fmt(benzSaldo);
    document.getElementById('benz-spent').textContent = 'spesi ' + fmt(benzSpeso);
    const bp = Math.min(100, (benzSpeso / BENZ_TOT) * 100);
    const bf = document.getElementById('benz-bar');
    bf.style.width = bp + '%';
    bf.style.background = bp >= 80 ? '#E24B4A' : '#BA7517';

    // paghetta
    document.getElementById('pagh-saldo').textContent = fmt(paghSaldo);
    document.getElementById('pagh-spent').textContent = 'spesi ' + fmt(paghSpeso);
    const pp = Math.min(100, (paghSpeso / PAGH_TOT) * 100);
    const pf = document.getElementById('pagh-bar');
    pf.style.width = pp + '%';
    pf.style.background = pp >= 80 ? '#E24B4A' : '#378ADD';

    // settimana
    document.getElementById('week-remaining').textContent =
      weekRem >= 0 ? fmt(weekRem) + ' rimanenti' : 'sforato di ' + fmt(-weekRem);
    document.getElementById('week-remaining').style.color =
      weekRem < 0 ? '#E24B4A' : weekRem < 5 ? '#BA7517' : '#4CAF50';
    const wf = document.getElementById('week-bar');
    wf.style.width = weekPct + '%';
    wf.style.background = weekPct >= 100 ? '#E24B4A' : weekPct >= 80 ? '#BA7517' : '#4CAF50';

    // storico
    const storico = document.getElementById('storico-list');
    if (movimenti.length === 0) {
      storico.innerHTML = '<div class="empty">Nessun movimento ancora</div>';
    } else {
      storico.innerHTML = [...movimenti].reverse().map(m => `
        <div class="entry">
          <div class="entry-left">
            <span class="entry-desc">${m.desc} <span class="pill ${m.tasca}">${m.tasca}</span></span>
            <span class="entry-meta">${new Date(m.data).toLocaleDateString('it-IT', {day:'2-digit',month:'short'})}</span>
          </div>
          <div class="entry-right">
            <span class="entry-amount ${m.tipo === 'spesa' ? 'neg' : 'pos'}">${m.tipo === 'spesa' ? '−' : '+'}${fmt(m.importo)}</span>
            <button class="btn-del" onclick="removeMovimento(${m.id})"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    // abbonamenti
    const subList = document.getElementById('sub-list');
    if (abbonamenti.length === 0) {
      subList.innerHTML = '<div class="empty">Nessun abbonamento</div>';
    } else {
      subList.innerHTML = abbonamenti.map(s => `
        <div class="sub-item">
          <div>
            <span class="sub-name">${s.nome} <span class="badge">${fmt(s.prezzo)}/mese</span> <span class="pill ${s.tasca}">${s.tasca}</span></span>
            <div class="sub-detail">Rinnovo ogni giorno ${s.giorno}</div>
          </div>
          <button class="btn-del" onclick="removeSub(${s.id})"><i class="ti ti-trash"></i></button>
        </div>
      `).join('');
    }

    checkNotifiche();
  }

  function checkNotifiche() {
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
    const area = document.getElementById('notif-area');
    const alerts = abbonamenti.filter(s => s.giorno === tomorrow.getDate());
    area.innerHTML = alerts.map(s =>
      `<div class="notif-banner"><i class="ti ti-bell"></i> Domani rinnovo <strong>${s.nome}</strong>: ${fmt(s.prezzo)}</div>`
    ).join('');
  }

  window.addMovimento = function() {
    const desc = document.getElementById('desc-input').value.trim();
    const amt = parseFloat(document.getElementById('amount-input').value);
    const sel = document.getElementById('type-select').value;
    if (!desc || isNaN(amt) || amt <= 0) { alert('Inserisci descrizione e importo'); return; }
    const [tipo, tasca] = sel.split('-');
    movimenti.push({ id: Date.now(), desc, importo: amt, tipo, tasca, data: new Date().toISOString() });
    save('bgt_movimenti', movimenti);
    document.getElementById('desc-input').value = '';
    document.getElementById('amount-input').value = '';
    render();
  };

  window.removeMovimento = function(id) {
    movimenti = movimenti.filter(m => m.id !== id);
    save('bgt_movimenti', movimenti);
    render();
  };

  window.addAbbonamento = function() {
    const nome = document.getElementById('sub-name').value.trim();
    const prezzo = parseFloat(document.getElementById('sub-price').value);
    const giorno = parseInt(document.getElementById('sub-day').value);
    const tasca = document.getElementById('sub-tasca').value;
    if (!nome || isNaN(prezzo) || prezzo <= 0 || isNaN(giorno) || giorno < 1 || giorno > 31) {
      alert('Inserisci tutti i dati'); return;
    }
    abbonamenti.push({ id: Date.now(), nome, prezzo, giorno, tasca });
    save('bgt_abbonamenti', abbonamenti);
    document.getElementById('sub-name').value = '';
    document.getElementById('sub-price').value = '';
    document.getElementById('sub-day').value = '';
    render();
  };

  window.removeSub = function(id) {
    abbonamenti = abbonamenti.filter(s => s.id !== id);
    save('bgt_abbonamenti', abbonamenti);
    render();
  };

  window.switchTab = function(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  };

  window.switchNav = function(tab) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    document.querySelector('.tab-bar .tab:nth-child(' + ({'spese':1,'abbonamenti':2,'storico':3}[tab]) + ')').classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  };

  // Notifiche push
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  function checkPushNotifiche() {
    if (Notification.permission !== 'granted') return;
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
    abbonamenti.filter(s => s.giorno === tomorrow.getDate()).forEach(s => {
      new Notification('💰 Rinnovo domani: ' + s.nome, {
        body: 'Verrà addebitato ' + fmt(s.prezzo) + ' dalla ' + s.tasca,
        icon: ''
      });
    });
  }

  // ── Service Worker & aggiornamenti PWA ──────────────────────────
  if ('serviceWorker' in navigator) {
    // Inietta il SW inline come blob per non richiedere file esterni
    const swCode = `
const CACHE = 'budget-v2';
const ASSETS = ['/'];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(ASSETS))
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  e.respondWith(
    fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request))
  );
});

self.addEventListener('message', e => {
  if (e.data === 'skipWaiting') self.skipWaiting();
});
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);

    navigator.serviceWorker.register(swUrl).then(reg => {
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            // Mostra banner di aggiornamento
            const banner = document.createElement('div');
            banner.className = 'notif-banner';
            banner.style.cssText = 'cursor:pointer;margin-bottom:12px;background:#001a0a;border-color:#4CAF5055;color:#4CAF50;';
            banner.innerHTML = '<i class="ti ti-refresh"></i> <span>Aggiornamento disponibile — <strong>tocca per aggiornare</strong></span>';
            banner.onclick = () => { newSW.postMessage('skipWaiting'); location.reload(); };
            const area = document.getElementById('notif-area');
            area.insertBefore(banner, area.firstChild);
          }
        });
      });
    }).catch(() => {});

    // Se il SW prende il controllo, ricarica in background
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }

  checkPushNotifiche();
  render();
})();
</script>
</body>
</html>
