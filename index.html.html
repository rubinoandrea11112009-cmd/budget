
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { padding: 1rem 0; }
  .cards { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1rem; }
  .card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
  .card-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .card-value { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .card-value.danger { color: #E24B4A; }
  .card-value.warn { color: #BA7517; }
  .card-value.ok { color: #3B6D11; }
  .tasca-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .tasca-card { border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1rem 1.25rem; background: var(--color-background-primary); }
  .tasca-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .tasca-amount { font-size: 24px; font-weight: 500; }
  .tasca-amount.benzina { color: #BA7517; }
  .tasca-amount.paghetta { color: #185FA5; }
  .tasca-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
  .bar { height: 6px; border-radius: 4px; background: var(--color-border-tertiary); margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row input, .row select { flex: 1; font-size: 13px; padding: 7px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
  .row input:focus, .row select:focus { border-color: #378ADD; }
  .btn { padding: 7px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .btn:hover { background: var(--color-background-tertiary); }
  .btn-danger { border-color: #F0959588; color: #A32D2D; }
  .btn-danger:hover { background: #FCEBEB; }
  .entry-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
  .entry { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-radius: var(--border-radius-md); background: var(--color-background-secondary); font-size: 13px; }
  .entry-info { display: flex; flex-direction: column; gap: 2px; }
  .entry-desc { color: var(--color-text-primary); }
  .entry-meta { font-size: 11px; color: var(--color-text-tertiary); }
  .entry-amount { font-weight: 500; }
  .entry-amount.neg { color: #E24B4A; }
  .entry-amount.pos { color: #3B6D11; }
  .pill { font-size: 10px; padding: 1px 7px; border-radius: 20px; display: inline-block; margin-left: 4px; }
  .pill.benzina { background: #FAEEDA; color: #633806; }
  .pill.paghetta { background: #E6F1FB; color: #185FA5; }
  .pill.entrata { background: #EAF3DE; color: #3B6D11; }
  .empty { font-size: 13px; color: var(--color-text-tertiary); text-align: center; padding: 1rem 0; }
  .week-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
  .sub-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-radius: var(--border-radius-md); background: var(--color-background-secondary); font-size: 13px; margin-bottom: 6px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #E6F1FB; color: #185FA5; }
  .notif-banner { background: #FAEEDA; border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 13px; color: #633806; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .tab-bar { display: flex; gap: 6px; margin-bottom: 1rem; }
  .tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); background: transparent; }
  .tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
  .panel { display: none; }
  .panel.active { display: block; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 10px 0; }
</style>

<div class="wrap">
  <h2 class="sr-only">Gestore budget mensile con tasche benzina e paghetta</h2>

  <div id="notif-area"></div>

  <div class="tasca-grid">
    <div class="tasca-card">
      <div class="tasca-title"><i class="ti ti-gas-station" aria-hidden="true"></i> Benzina</div>
      <div class="tasca-amount benzina" id="benz-saldo">€65,00</div>
      <div class="tasca-sub" id="benz-sub">spesi €0,00 di €65,00</div>
      <div class="bar"><div class="bar-fill" id="benz-bar" style="width:0%;background:#BA7517;"></div></div>
    </div>
    <div class="tasca-card">
      <div class="tasca-title"><i class="ti ti-pig-money" aria-hidden="true"></i> Paghetta</div>
      <div class="tasca-amount paghetta" id="pagh-saldo">€60,00</div>
      <div class="tasca-sub" id="pagh-sub">spesi €0,00 di €60,00</div>
      <div class="bar"><div class="bar-fill" id="pagh-bar" style="width:0%;background:#185FA5;"></div></div>
    </div>
  </div>

  <div class="section" style="padding: 0.75rem 1.25rem;">
    <div class="week-info" style="margin:0;">
      <span>Limite settimana (paghetta): €15,00</span>
      <span id="week-remaining">rimangono €15,00</span>
    </div>
    <div class="bar" style="margin-top:8px;"><div class="bar-fill" id="week-bar-fill" style="width:0%;background:#3B6D11;"></div></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('spese',this)">Spese / entrate</button>
    <button class="tab" onclick="switchTab('abbonamenti',this)">Abbonamenti</button>
    <button class="tab" onclick="switchTab('storico',this)">Storico</button>
  </div>

  <div class="panel active" id="panel-spese">
    <div class="section">
      <div class="section-title"><i class="ti ti-plus-minus" aria-hidden="true"></i> Aggiungi movimento</div>
      <div class="row">
        <input type="text" id="desc-input" placeholder="Descrizione (es. benzina Q8)" />
        <input type="number" id="amount-input" placeholder="€" step="0.01" min="0" style="max-width:90px;" />
      </div>
      <div class="row">
        <select id="type-select">
          <option value="spesa-paghetta">Spesa — paghetta</option>
          <option value="spesa-benzina">Spesa — benzina</option>
          <option value="entrata-paghetta">Entrata — paghetta</option>
          <option value="entrata-benzina">Entrata — benzina</option>
        </select>
        <button class="btn" onclick="addMovimento()"><i class="ti ti-check" aria-hidden="true"></i> Aggiungi</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-abbonamenti">
    <div class="section">
      <div class="section-title"><i class="ti ti-refresh" aria-hidden="true"></i> I tuoi abbonamenti</div>
      <div id="sub-list"></div>
      <hr class="divider">
      <div class="section-title" style="margin-top:8px;">Aggiungi abbonamento</div>
      <div class="row">
        <input type="text" id="sub-name" placeholder="Nome (es. Netflix)" />
        <input type="number" id="sub-price" placeholder="€/mese" step="0.01" min="0" style="max-width:90px;" />
      </div>
      <div class="row">
        <input type="number" id="sub-day" placeholder="Giorno rinnovo (es. 10)" min="1" max="31" />
        <select id="sub-tasca">
          <option value="paghetta">Paghetta</option>
          <option value="benzina">Benzina</option>
        </select>
        <button class="btn" onclick="addAbbonamento()"><i class="ti ti-plus" aria-hidden="true"></i> Ok</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-storico">
    <div class="section">
      <div class="section-title"><i class="ti ti-history" aria-hidden="true"></i> Tutti i movimenti</div>
      <div class="entry-list" id="storico-list"><div class="empty">Nessun movimento ancora</div></div>
    </div>
  </div>
</div>

<script>
(function(){
  const BENZ_TOT = 65;
  const PAGH_TOT = 60;
  const WEEK_LIMIT = 15;

  function load(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch(e){ return def; } }
  function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }

  let movimenti = load('sc2_movimenti', []);
  let abbonamenti = load('sc2_abbonamenti', [
    { id: 1, nome: 'iCloud', prezzo: 0.99, giorno: 10, tasca: 'paghetta' }
  ]);

  function fmt(n) { return '€' + Math.abs(n).toFixed(2).replace('.', ','); }

  function getMonday() {
    const d = new Date(); const day = d.getDay() || 7;
    d.setHours(0,0,0,0); d.setDate(d.getDate() - day + 1); return d;
  }

  function calcTasca(tasca) {
    return movimenti.filter(m => m.tasca === tasca).reduce((acc, m) => {
      return m.tipo === 'entrata' ? acc + m.importo : acc - m.importo;
    }, tasca === 'benzina' ? BENZ_TOT : PAGH_TOT);
  }

  function calcSpeso(tasca) {
    return movimenti.filter(m => m.tasca === tasca && m.tipo === 'spesa').reduce((acc, m) => acc + m.importo, 0);
  }

  function calcWeek() {
    const monday = getMonday();
    return movimenti.filter(m => m.tipo === 'spesa' && m.tasca === 'paghetta' && new Date(m.data) >= monday)
      .reduce((acc, m) => acc + m.importo, 0);
  }

  function colorClass(val, tot) {
    const pct = (tot - val) / tot;
    return pct >= 0.8 ? 'danger' : pct >= 0.5 ? 'warn' : 'ok';
  }

  function render() {
    const benzSaldo = calcTasca('benzina');
    const paghSaldo = calcTasca('paghetta');
    const benzSpeso = calcSpeso('benzina');
    const paghSpeso = calcSpeso('paghetta');
    const weekSpent = calcWeek();
    const weekRem = WEEK_LIMIT - weekSpent;
    const weekPct = Math.min(100, (weekSpent / WEEK_LIMIT) * 100);

    document.getElementById('benz-saldo').textContent = fmt(benzSaldo);
    document.getElementById('benz-sub').textContent = 'spesi ' + fmt(benzSpeso) + ' di €65,00';
    const benzPct = Math.min(100, (benzSpeso / BENZ_TOT) * 100);
    document.getElementById('benz-bar').style.width = benzPct + '%';
    document.getElementById('benz-bar').style.background = benzPct >= 80 ? '#E24B4A' : '#BA7517';

    document.getElementById('pagh-saldo').textContent = fmt(paghSaldo);
    document.getElementById('pagh-sub').textContent = 'spesi ' + fmt(paghSpeso) + ' di €60,00';
    const paghPct = Math.min(100, (paghSpeso / PAGH_TOT) * 100);
    document.getElementById('pagh-bar').style.width = paghPct + '%';
    document.getElementById('pagh-bar').style.background = paghPct >= 80 ? '#E24B4A' : '#185FA5';

    document.getElementById('week-remaining').textContent =
      weekRem >= 0 ? 'rimangono ' + fmt(weekRem) : 'sforato di ' + fmt(-weekRem);
    const wf = document.getElementById('week-bar-fill');
    wf.style.width = weekPct + '%';
    wf.style.background = weekPct >= 100 ? '#E24B4A' : weekPct >= 80 ? '#BA7517' : '#3B6D11';

    const storico = document.getElementById('storico-list');
    if (movimenti.length === 0) {
      storico.innerHTML = '<div class="empty">Nessun movimento ancora</div>';
    } else {
      storico.innerHTML = [...movimenti].reverse().map(m => `
        <div class="entry">
          <div class="entry-info">
            <span class="entry-desc">${m.desc}<span class="pill ${m.tasca}">${m.tasca}</span></span>
            <span class="entry-meta">${new Date(m.data).toLocaleDateString('it-IT')}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="entry-amount ${m.tipo === 'spesa' ? 'neg' : 'pos'}">
              ${m.tipo === 'spesa' ? '-' : '+'}${fmt(m.importo)}
            </span>
            <button class="btn btn-danger" style="padding:4px 8px;font-size:11px;" onclick="removeMovimento(${m.id})">
              <i class="ti ti-trash" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    const subList = document.getElementById('sub-list');
    if (abbonamenti.length === 0) {
      subList.innerHTML = '<div class="empty">Nessun abbonamento</div>';
    } else {
      subList.innerHTML = abbonamenti.map(s => `
        <div class="sub-row">
          <div>
            <span>${s.nome}</span>
            <span class="badge" style="margin-left:6px;">${fmt(s.prezzo)}/mese</span>
            <span class="pill ${s.tasca}" style="margin-left:4px;">${s.tasca}</span>
            <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px;">Rinnovo il giorno ${s.giorno}</div>
          </div>
          <button class="btn btn-danger" style="padding:4px 8px;font-size:11px;" onclick="removeSub(${s.id})">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        </div>
      `).join('');
    }

    checkNotifiche();
  }

  function checkNotifiche() {
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
    const area = document.getElementById('notif-area');
    const alerts = abbonamenti.filter(s => s.giorno === tomorrow.getDate());
    area.innerHTML = alerts.map(s =>
      `<div class="notif-banner"><i class="ti ti-bell" aria-hidden="true"></i> Domani rinnovo <strong>${s.nome}</strong>: ${fmt(s.prezzo)} dalla ${s.tasca}</div>`
    ).join('');
  }

  window.addMovimento = function() {
    const desc = document.getElementById('desc-input').value.trim();
    const amt = parseFloat(document.getElementById('amount-input').value);
    const sel = document.getElementById('type-select').value;
    if (!desc || isNaN(amt) || amt <= 0) { alert('Inserisci descrizione e importo valido'); return; }
    const [tipo, tasca] = sel.split('-');
    movimenti.push({ id: Date.now(), desc, importo: amt, tipo, tasca, data: new Date().toISOString() });
    save('sc2_movimenti', movimenti);
    document.getElementById('desc-input').value = '';
    document.getElementById('amount-input').value = '';
    render();
  };

  window.removeMovimento = function(id) {
    movimenti = movimenti.filter(m => m.id !== id);
    save('sc2_movimenti', movimenti);
    render();
  };

  window.addAbbonamento = function() {
    const nome = document.getElementById('sub-name').value.trim();
    const prezzo = parseFloat(document.getElementById('sub-price').value);
    const giorno = parseInt(document.getElementById('sub-day').value);
    const tasca = document.getElementById('sub-tasca').value;
    if (!nome || isNaN(prezzo) || prezzo <= 0 || isNaN(giorno) || giorno < 1 || giorno > 31) {
      alert('Inserisci tutti i dati correttamente'); return;
    }
    abbonamenti.push({ id: Date.now(), nome, prezzo, giorno, tasca });
    save('sc2_abbonamenti', abbonamenti);
    document.getElementById('sub-name').value = '';
    document.getElementById('sub-price').value = '';
    document.getElementById('sub-day').value = '';
    render();
  };

  window.removeSub = function(id) {
    abbonamenti = abbonamenti.filter(s => s.id !== id);
    save('sc2_abbonamenti', abbonamenti);
    render();
  };

  window.switchTab = function(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  };

  render();
})();
</script>
